name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  AGENT_TOOLSDIRECTORY: "/opt/hostedtoolcache"
  RUSTUP_HOME: "/opt/hostedtoolcache/rustup"
  CARGO_HOME: "/opt/hostedtoolcache/cargo"
  CARGO_TARGET_DIR: "/opt/hostedtoolcache/cargo/target"
  UV_INSTALL_DIR: "/opt/hostedtoolcache/uv"
  UV_CACHE_DIR: "/opt/hostedtoolcache/uv-cache"
  UV_PYTHON_INSTALL_DIR: "/opt/hostedtoolcache/uv/python"
  UV_PYTHON_PREFERENCE: only-managed
  # PVC Paths for pre-built Wayland dependencies
  WAYLAND_INSTALL_DIR: "/opt/hostedtoolcache/qtile-deps/wayland/install"
  PKG_CONFIG_PATH: "/opt/hostedtoolcache/qtile-deps/wayland/install/lib/pkgconfig:/opt/hostedtoolcache/qtile-deps/wayland/install/share/pkgconfig"
  LD_LIBRARY_PATH: "/opt/hostedtoolcache/qtile-deps/wayland/install/lib"
  DEBIAN_FRONTEND: "noninteractive"

jobs:
  # This job ensures that only ONE runner attempts to setup/update the PVC toolcache at a time.
  prepare:
    name: Prepare toolcache
    runs-on: qtile
    concurrency:
      group: pvc-toolcache-lock
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Network Pre-flight
        run: until timeout 1 bash -c "cat < /dev/null > /dev/tcp/github.com/443"; do sleep 5; done

      - name: update GITHUB_PATH
        run: |
          echo "${{ env.CARGO_HOME }}/bin" >> $GITHUB_PATH
          echo "${{ env.RUSTUP_HOME }}/bin" >> $GITHUB_PATH
          echo "${{ env.UV_INSTALL_DIR }}/bin" >> $GITHUB_PATH
          echo "${{ env.WAYLAND_INSTALL_DIR }}/bin" >> $GITHUB_PATH

      - name: Setup Rust (Forced Update)
        run: |
          rustup toolchain install stable --profile minimal --force
          rustup toolchain install nightly --profile minimal --component rustfmt,clippy --force
          rustup default stable

      - name: Install System Deps
        run: ./.github/scripts/install-deps $(cat ./deps)

  lint:
    name: Lint & Format (${{ matrix.rust }})
    needs: prepare
    runs-on: qtile
    strategy:
      matrix:
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v4

      - name: update GITHUB_PATH
        run: |
          echo "${{ env.CARGO_HOME }}/bin" >> $GITHUB_PATH
          echo "${{ env.RUSTUP_HOME }}/bin" >> $GITHUB_PATH

      - name: Format check
        run: cargo +${{ matrix.rust }} fmt -- --check

      - name: Clippy
        run: cargo +${{ matrix.rust }} clippy -- -D warnings

  test:
    name: Test (Python ${{ matrix.python-version }}, Rust ${{ matrix.rust }})
    needs: lint
    runs-on: qtile
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        rust: [stable, nightly]

    continue-on-error: ${{ matrix.python-version == '3.14' || matrix.rust == 'nightly' }}

    steps:
      - uses: actions/checkout@v4

      - name: Network Pre-flight
        run: until timeout 1 bash -c "cat < /dev/null > /dev/tcp/github.com/443"; do sleep 5; done

      - name: update GITHUB_PATH
        run: |
          echo "${{ env.WAYLAND_INSTALL_DIR }}/bin" >> $GITHUB_PATH
          echo "${{ env.UV_INSTALL_DIR }}/bin" >> $GITHUB_PATH
          echo "${{ env.CARGO_HOME }}/bin" >> $GITHUB_PATH
          echo "${{ env.RUSTUP_HOME }}/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install System Deps
        run: ./.github/scripts/install-deps $(cat ./deps)

      - name: Install Qtile via uv
        run: |
          ./.github/scripts/install-qtile ${{ matrix.python-version }}

      - name: Start seatd
        run: |
          sudo seatd -g video &
          sleep 1

      - name: Run X11 Tests
        run: ./.github/scripts/run-x11-tests ${{ matrix.python-version }}

      - name: Run Wayland Tests
        env:
          XWAYLAND: ${{ env.WAYLAND_INSTALL_DIR }}/bin/Xwayland
        run: ./.github/scripts/run-wl-tests ${{ matrix.python-version }}
