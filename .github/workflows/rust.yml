name: Rust CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Global concurrency removed to prevent "Higher Priority" cancellations.
# Jobs now use unique directories or internal locks.

env:
  CARGO_TERM_COLOR: always
  AGENT_TOOLSDIRECTORY: "/opt/hostedtoolcache"
  RUSTUP_HOME: "/opt/hostedtoolcache/rustup"
  CARGO_HOME: "/opt/hostedtoolcache/cargo"
  # Folder isolation: target/pr123 or target/main
  CARGO_TARGET_DIR: "/opt/hostedtoolcache/cargo/target/${{ github.event.pull_request.number && format('pr{0}', github.event.pull_request.number) || github.ref_name }}"

  # sccache configuration
  SCCACHE_DIR: "/opt/hostedtoolcache/sccache"
  SCCACHE_CACHE_SIZE: "15G"

  # Tool paths
  UV_INSTALL_DIR: "/opt/hostedtoolcache/uv"
  WAYLAND_INSTALL_DIR: "/opt/hostedtoolcache/qtile-deps/wayland/install"
  PKG_CONFIG_PATH: "/opt/hostedtoolcache/qtile-deps/wayland/install/lib/pkgconfig:/opt/hostedtoolcache/qtile-deps/wayland/install/share/pkgconfig"
  LD_LIBRARY_PATH: "/opt/hostedtoolcache/qtile-deps/wayland/install/lib"
  DEBIAN_FRONTEND: "noninteractive"

jobs:
  prepare:
    name: Prepare toolcache
    runs-on: qtile
    concurrency:
      group: pvc-toolcache-lock
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: update GITHUB_PATH
        run: |
          echo "${{ env.CARGO_HOME }}/bin" >> $GITHUB_PATH
          echo "${{ env.RUSTUP_HOME }}/bin" >> $GITHUB_PATH

      - name: Setup Rust & tools
        run: |
          rustup toolchain install stable nightly --profile minimal --no-self-update
          rustup default stable
          rustup component add llvm-tools
          cargo binstall -y sccache cargo-llvm-cov

      - name: Install System Deps
        run: ./.github/scripts/install-deps $(cat ./deps)

  lint:
    name: Lint & Format (${{ matrix.rust }})
    needs: prepare
    runs-on: qtile
    env:
      RUSTC_WRAPPER: "sccache"
    strategy:
      matrix:
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v4

      - name: update GITHUB_PATH
        run: |
          echo "${{ env.CARGO_HOME }}/bin" >> $GITHUB_PATH
          echo "${{ env.RUSTUP_HOME }}/bin" >> $GITHUB_PATH

      - name: Start sccache
        run: sccache --start-server

      - name: Format check
        run: cargo +${{ matrix.rust }} fmt -- --check

      - name: Cargo check
        run: cargo +${{ matrix.rust }} check --all-features --all-targets

      - name: Clippy
        run: cargo +${{ matrix.rust }} clippy --all-features --all-targets -- -D warnings

      - name: Finalize sccache
        if: always() # Ensures it stops even if tests fail
        run: |
          sccache --show-stats
          sccache --stop-server

  test:
    name: Test (Python ${{ matrix.python-version }}, Rust ${{ matrix.rust }})
    needs: lint
    runs-on: qtile
    # NOTE: Lint is slower with sccache (~+10s) — overhead outweighs savings on short check/clippy runs
    # env:
    #   RUSTC_WRAPPER: "sccache"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v4

      - name: update GITHUB_PATH
        run: |
          echo "${{ env.WAYLAND_INSTALL_DIR }}/bin" >> $GITHUB_PATH
          echo "${{ env.UV_INSTALL_DIR }}/bin" >> $GITHUB_PATH
          echo "${{ env.CARGO_HOME }}/bin" >> $GITHUB_PATH
          echo "${{ env.RUSTUP_HOME }}/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Start sccache
        run: sccache --start-server

      - name: Install System Deps
        run: ./.github/scripts/install-deps $(cat ./deps)

      - name: Setup Python Dev Environment
        run: |
          # 1. Ensure the specific python version is installed
          uv python install ${{ matrix.python-version }}

          # 2. Find the path to the python binary
          PYTHON_BIN=$(uv python find ${{ matrix.python-version }})

          # 3. Get the base directory (parent of the 'bin' folder)
          PY_DIR=$(dirname $(dirname "$PYTHON_BIN"))

          # 4. Export paths for pkg-config and compiler
          echo "PKG_CONFIG_PATH=$PY_DIR/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

          # 5. Extract the include path using the binary itself
          PY_INCLUDE=$($PYTHON_BIN -c "import sysconfig; print(sysconfig.get_path('include'))")
          echo "CFLAGS=-I$PY_INCLUDE" >> $GITHUB_ENV

          # Debug output to verify
          echo "Using Python at: $PYTHON_BIN"
          echo "Include path: $PY_INCLUDE"

      - name: Install Qtile via uv
        run: ./.github/scripts/install-qtile ${{ matrix.python-version }} https://github.com/qtile/qtile master

      - name: Start seatd
        run: |
          sudo seatd -g video &
          sleep 1

      - name: Run Tests
        run: ./.github/scripts/run-tests ${{ matrix.python-version }}
        env:
          XWAYLAND: ${{ env.WAYLAND_INSTALL_DIR }}/bin/Xwayland
      - name: Finalize sccache
        if: always() # Ensures it stops even if tests fail
        run: |
          sccache --show-stats
          sccache --stop-server

  coverage:
    name: Coverage
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    needs: test
    runs-on: qtile
    env:
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      - name: Network Pre-flight
        run: until timeout 1 bash -c "cat < /dev/null > /dev/tcp/github.com/443"; do sleep 5; done

      - name: update GITHUB_PATH
        run: |
          echo "${{ env.WAYLAND_INSTALL_DIR }}/bin" >> $GITHUB_PATH
          echo "${{ env.UV_INSTALL_DIR }}/bin" >> $GITHUB_PATH
          echo "${{ env.CARGO_HOME }}/bin" >> $GITHUB_PATH
          echo "${{ env.RUSTUP_HOME }}/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install System Deps
        run: ./.github/scripts/install-deps $(cat ./deps)

      - name: Setup Python Dev Environment
        run: |
          uv python install 3.12
          PYTHON_BIN=$(uv python find 3.12)
          PY_DIR=$(dirname $(dirname "$PYTHON_BIN"))
          echo "PKG_CONFIG_PATH=$PY_DIR/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          PY_INCLUDE=$($PYTHON_BIN -c "import sysconfig; print(sysconfig.get_path('include'))")
          echo "CFLAGS=-I$PY_INCLUDE" >> $GITHUB_ENV

      - name: Install Qtile via uv
        run: ./.github/scripts/install-qtile 3.12 https://github.com/qtile/qtile master

      - name: Start seatd
        run: |
          sudo seatd -g video &
          sleep 1

      - name: Generate coverage
        run: ./.github/scripts/run-coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/llvm-cov/lcov.info
          fail_ci_if_error: false

      - name: Finalize sccache
        if: always() # Ensures it stops even if tests fail
        run: |
          sccache --show-stats
          sccache --stop-server
